version: 1
frontend:
  phases:
    preBuild:
      commands:
        - yarn install --frozen-lockfile
    build:
      commands:
        - env | grep -E '^(REACT_EDITOR|NEXT_PUBLIC_SUPABASE_URL|NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY|NEXT_PUBLIC_ANANTARA_CLIENT_BASE_URL|NEXT_PUBLIC_IMAGE_PUBLIC_BASE_URL|S3_REGION|S3_BUCKET|S3_ACCESS_KEY|S3_SECRET_ACCESS_KEY|S3_CMS_FOLDER|S3_CLIENT_FOLDER|SES_REGION|SES_ACCESS_KEY_ID|SES_SECRET_ACCESS_KEY|SES_FROM|SES_TO|NODE_ENV)=' > .env.production
        - yarn build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
